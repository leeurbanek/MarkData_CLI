[data]
symbol_list = ["VTI", "VUG"]

[loggers]
keys = root,appLogger

[handlers]
keys = file,stream

[formatters]
keys = file,stream

[logger_root]
level = NOTSET
handlers = file,stream

[logger_appLogger]
level = NOTSET
handlers = file,stream
qualname = appLogger
propagate = 0

[handler_file]
class = FileHandler
level = DEBUG
formatter = file
args = ('debug.log', 'w')

[handler_stream]
class = StreamHandler
level = INFO
formatter = stream
args = (sys.stdout,)

[formatter_file]
datefmt = %S
format = %(asctime)s.%(msecs)-4d%(levelname)-9s%(name)-25s%(message)s

[formatter_stream]
class = colorlog.ColoredFormatter
datefmt = %S
format = %(log_color)s%(levelname)-9s%(name)-25s%(message)s

[default]
chart_dir = None
db_path = ./markdata_db.sqlite3
